<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ARSt — Peso Argentino Digital</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@300;400;500;600&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{--bg:#080d1a;--surface:#0d1525;--surface2:#111e30;--border:#1c2e45;--border2:#263d59;--text:#e0eaf5;--muted:#4a6480;--muted2:#7a9ab5;--blue:#00b4d8;--blue-dim:rgba(0,180,216,.10);--gold:#c9a84c;--gold-dim:rgba(201,168,76,.10);--green:#10b981;--green-dim:rgba(16,185,129,.10);--red:#ef4444;--red-dim:rgba(239,68,68,.10)}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:'Inter',sans-serif;font-size:14px;line-height:1.6;min-height:100vh}
a{color:var(--blue);text-decoration:none}
a:hover{text-decoration:underline}

/* ── Navbar ── */
nav{position:sticky;top:0;z-index:100;background:rgba(8,13,26,.92);backdrop-filter:blur(16px);border-bottom:1px solid var(--border);padding:0 32px;height:60px;display:flex;align-items:center;justify-content:space-between}
.nav-logo{font-family:'IBM Plex Mono',monospace;font-size:17px;font-weight:600;display:flex;align-items:center;gap:10px;color:var(--text);text-decoration:none}
.logo-mark{width:32px;height:32px;background:linear-gradient(135deg,var(--gold),#e6c56a);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:700;color:#080d1a}
.logo-sub{color:var(--blue)}
.nav-right{display:flex;align-items:center;gap:14px}
.nav-links{display:flex;gap:24px}
.nav-links a{font-size:13px;color:var(--muted2);text-decoration:none;transition:color .15s}
.nav-links a:hover{color:var(--text)}
.network-pill{font-family:'IBM Plex Mono',monospace;font-size:10px;letter-spacing:1.2px;text-transform:uppercase;padding:4px 10px;border-radius:20px;background:var(--blue-dim);color:var(--blue);border:1px solid rgba(0,180,216,.2)}

/* ── Buttons ── */
.btn{padding:8px 18px;border-radius:8px;font-family:'IBM Plex Mono',monospace;font-size:12px;font-weight:500;cursor:pointer;border:none;transition:all .18s ease}
.btn-primary{background:var(--blue);color:#080d1a}.btn-primary:hover{background:#00c8f0;transform:translateY(-1px)}
.btn-outline{background:transparent;color:var(--text);border:1px solid var(--border2)}.btn-outline:hover{border-color:var(--blue);color:var(--blue)}
.btn-gold{background:var(--gold);color:#080d1a}.btn-gold:hover{background:#dbb85a;transform:translateY(-1px)}
.btn:disabled{opacity:.5;cursor:not-allowed;transform:none!important}

/* ── Hero ── */
.hero{padding:72px 32px 56px;max-width:1100px;margin:0 auto}
.hero-eyebrow{font-family:'IBM Plex Mono',monospace;font-size:11px;letter-spacing:2px;text-transform:uppercase;color:var(--muted);margin-bottom:20px;display:flex;align-items:center;gap:10px}
.hero-eyebrow::before{content:'';width:24px;height:1px;background:var(--muted)}
.hero-title{font-family:'IBM Plex Mono',monospace;font-size:clamp(32px,5vw,56px);font-weight:600;line-height:1.08;letter-spacing:-2px;margin-bottom:16px}
.accent-gold{color:var(--gold)}.accent-blue{color:var(--blue)}
.hero-sub{color:var(--muted2);font-size:16px;max-width:520px;margin-bottom:40px;line-height:1.7}

/* ── Ticker ── */
.ticker{display:inline-flex;align-items:baseline;gap:12px;background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:16px 24px;margin-bottom:48px}
.ticker-label{font-family:'IBM Plex Mono',monospace;font-size:10px;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted)}
.ticker-value{font-family:'IBM Plex Mono',monospace;font-size:32px;font-weight:600;color:var(--text);animation:pulse-price 3s ease-in-out infinite}
.ticker-unit{font-family:'IBM Plex Mono',monospace;font-size:13px;color:var(--muted2)}
.ticker-ts{font-family:'IBM Plex Mono',monospace;font-size:10px;color:var(--muted);margin-left:4px}
@keyframes pulse-price{0%,100%{opacity:1}50%{opacity:.75}}
.ticker-change{font-family:'IBM Plex Mono',monospace;font-size:11px;padding:3px 8px;border-radius:4px}
.ticker-change.up{background:var(--green-dim);color:var(--green)}.ticker-change.dn{background:var(--red-dim);color:var(--red)}

/* ── Metrics ── */
.metrics{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:56px}
.metric{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:22px 24px;position:relative;overflow:hidden}
.metric::before{content:'';position:absolute;top:0;left:0;right:0;height:2px}
.metric.m-blue::before{background:var(--blue)}.metric.m-gold::before{background:var(--gold)}.metric.m-green::before{background:var(--green)}.metric.m-muted::before{background:var(--muted)}.metric.m-red::before{background:var(--red)}
.metric-label{font-family:'IBM Plex Mono',monospace;font-size:9px;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted);margin-bottom:12px}
.metric-value{font-family:'IBM Plex Mono',monospace;font-size:24px;font-weight:600;line-height:1;color:var(--text)}
.metric-sub{font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--muted2);margin-top:8px}
.metric-status-ok{color:var(--green);font-size:11px;margin-top:8px;font-family:'IBM Plex Mono',monospace}
.metric-status-pause{color:var(--red);font-size:11px;margin-top:8px;font-family:'IBM Plex Mono',monospace}
.cbar{height:3px;background:var(--border);border-radius:2px;margin-top:12px;overflow:hidden}
.cbar-fill{height:100%;border-radius:2px;background:linear-gradient(90deg,var(--green),var(--blue));transition:width .6s ease}

/* ── About section ── */
.about{max-width:1100px;margin:0 auto;padding:0 32px 72px}
.about-grid{display:grid;grid-template-columns:1fr 1fr;gap:32px;margin-top:32px}
.about-card{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:28px 32px}
.about-card h3{font-family:'IBM Plex Mono',monospace;font-size:14px;font-weight:600;color:var(--text);margin-bottom:14px;display:flex;align-items:center;gap:10px}
.about-card h3 .icon{width:32px;height:32px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0}
.about-card p{color:var(--muted2);font-size:13px;line-height:1.75;margin-bottom:10px}
.about-card p:last-child{margin-bottom:0}
.about-steps{counter-reset:step;list-style:none;padding:0}
.about-steps li{counter-increment:step;display:flex;gap:14px;margin-bottom:16px;font-size:13px;color:var(--muted2);line-height:1.6}
.about-steps li::before{content:counter(step);width:24px;height:24px;border-radius:50%;background:var(--blue-dim);border:1px solid rgba(0,180,216,.3);color:var(--blue);font-family:'IBM Plex Mono',monospace;font-size:11px;font-weight:600;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:2px}
.about-steps li strong{color:var(--text)}
.security-badges{display:flex;flex-wrap:wrap;gap:8px;margin-top:16px}
.badge-security{padding:5px 12px;border-radius:6px;font-family:'IBM Plex Mono',monospace;font-size:10px;letter-spacing:.5px;background:var(--green-dim);border:1px solid rgba(16,185,129,.2);color:var(--green)}

/* ── Section ── */
.section{max-width:1100px;margin:0 auto;padding:0 32px 72px}
.section-title{font-family:'IBM Plex Mono',monospace;font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--muted);margin-bottom:24px;display:flex;align-items:center;gap:12px}
.section-title::after{content:'';flex:1;height:1px;background:var(--border)}

/* ── Tabs ── */
.tabs{display:flex;gap:2px;background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:4px;margin-bottom:24px;width:fit-content}
.tab{padding:9px 22px;border-radius:7px;font-family:'IBM Plex Mono',monospace;font-size:11px;cursor:pointer;border:none;background:transparent;color:var(--muted);transition:all .15s ease}
.tab.active{background:var(--surface2);color:var(--text);border:1px solid var(--border2)}
.tab:hover:not(.active){color:var(--muted2)}

/* ── Panel ── */
.panel{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:32px}

/* ── Wallet prompt ── */
.wallet-prompt{text-align:center;padding:56px 24px}
.wallet-icon{width:64px;height:64px;background:var(--surface2);border:1px solid var(--border);border-radius:16px;display:flex;align-items:center;justify-content:center;font-size:28px;margin:0 auto 20px}
.wallet-prompt h3{font-family:'IBM Plex Mono',monospace;font-size:17px;font-weight:500;margin-bottom:10px}
.wallet-prompt p{color:var(--muted2);margin-bottom:28px;font-size:13px;max-width:320px;margin-left:auto;margin-right:auto}

/* ── Form elements ── */
.field-label{font-family:'IBM Plex Mono',monospace;font-size:10px;letter-spacing:1.2px;text-transform:uppercase;color:var(--muted);margin-bottom:6px}
.field-input{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:12px 14px;font-family:'IBM Plex Mono',monospace;font-size:13px;color:var(--text);outline:none;transition:border-color .15s}
.field-input:focus{border-color:var(--blue)}.field-input::placeholder{color:var(--muted)}
.field-hint{font-size:11px;color:var(--muted);margin-top:5px}
.gap3{display:flex;flex-direction:column;gap:14px}

/* ── Previews ── */
.amount-preview{background:var(--blue-dim);border:1px solid rgba(0,180,216,.2);border-radius:8px;padding:14px 16px;font-family:'IBM Plex Mono',monospace;font-size:13px;display:flex;justify-content:space-between;align-items:center}
.amount-preview .lbl{color:var(--muted2)}.amount-preview .val{color:var(--blue);font-weight:500}
.balance-display{background:var(--gold-dim);border:1px solid rgba(201,168,76,.2);border-radius:10px;padding:16px 18px;display:flex;justify-content:space-between;align-items:center}
.balance-display .bl{font-family:'IBM Plex Mono',monospace;font-size:10px;letter-spacing:1px;text-transform:uppercase;color:var(--muted2)}
.balance-display .bv{font-family:'IBM Plex Mono',monospace;font-size:20px;font-weight:600;color:var(--gold)}
.balance-usd{font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--muted2);margin-top:4px}

/* ── Alerts ── */
.alert{padding:12px 16px;border-radius:8px;font-size:12px;margin-bottom:14px;line-height:1.6}
.alert-info{background:var(--blue-dim);border:1px solid rgba(0,180,216,.2);color:var(--muted2)}
.alert-warn{background:var(--gold-dim);border:1px solid rgba(201,168,76,.2);color:var(--gold)}
.alert-success{background:var(--green-dim);border:1px solid rgba(16,185,129,.2);color:var(--green)}
.alert-error{background:var(--red-dim);border:1px solid rgba(239,68,68,.2);color:var(--red)}

/* ── Deposit steps ── */
.deposit-steps{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:24px}
.step{background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:18px 20px}
.step-num{font-family:'IBM Plex Mono',monospace;font-size:10px;letter-spacing:1px;color:var(--blue);margin-bottom:8px}
.step h4{font-family:'IBM Plex Mono',monospace;font-size:13px;font-weight:500;margin-bottom:4px}
.step p{font-size:12px;color:var(--muted2)}
.divider{height:1px;background:var(--border);margin:22px 0}

/* ── History table ── */
.history-table{width:100%;border-collapse:collapse}
.history-table th{font-family:'IBM Plex Mono',monospace;font-size:9px;letter-spacing:1.2px;text-transform:uppercase;color:var(--muted);text-align:left;padding:11px 16px;border-bottom:1px solid var(--border);background:var(--surface2)}
.history-table td{padding:13px 16px;font-family:'IBM Plex Mono',monospace;font-size:12px;color:var(--text);border-bottom:1px solid var(--border)}
.history-table tr:last-child td{border-bottom:none}.history-table tr:hover td{background:rgba(255,255,255,.015)}
.badge{padding:3px 8px;border-radius:4px;font-size:10px}
.badge-mint{background:var(--green-dim);color:var(--green)}.badge-burn{background:var(--red-dim);color:var(--red)}
.tx-link{color:var(--blue);text-decoration:none;font-size:11px}.tx-link:hover{text-decoration:underline}

/* ── User balance card ── */
.user-balance-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px;margin-bottom:24px}
.user-stat{background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:16px 18px}
.user-stat-label{font-family:'IBM Plex Mono',monospace;font-size:9px;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted);margin-bottom:10px}
.user-stat-value{font-family:'IBM Plex Mono',monospace;font-size:20px;font-weight:600;color:var(--text)}
.user-stat-sub{font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--muted2);margin-top:5px}

/* ── Wallet modal ── */
.wallet-modal{position:fixed;inset:0;background:rgba(0,0,0,.75);backdrop-filter:blur(6px);z-index:200;display:flex;align-items:center;justify-content:center}
.wallet-modal-inner{background:var(--surface);border:1px solid var(--border);border-radius:18px;padding:36px;width:400px;max-width:90vw}
.wallet-modal-inner h3{font-family:'IBM Plex Mono',monospace;font-size:17px;margin-bottom:8px}
.wallet-modal-inner p{color:var(--muted2);font-size:13px;margin-bottom:24px}
.wallet-option{display:flex;align-items:center;gap:14px;padding:15px 18px;background:var(--surface2);border:1px solid var(--border);border-radius:10px;cursor:pointer;margin-bottom:10px;transition:border-color .15s}
.wallet-option:hover{border-color:var(--blue)}.wallet-option.disabled{opacity:.4;cursor:default}
.wallet-option-icon{width:38px;height:38px;border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:19px;background:var(--surface);flex-shrink:0;overflow:hidden}
.wallet-option-icon img{width:26px;height:26px;object-fit:contain;border-radius:4px}
.wallet-option-name{font-family:'IBM Plex Mono',monospace;font-size:13px;font-weight:500}
.wallet-option-sub{font-size:11px;color:var(--muted2)}
.connected-badge{font-family:'IBM Plex Mono',monospace;font-size:11px;padding:7px 14px;border-radius:8px;background:var(--surface2);border:1px solid var(--border2);color:var(--text);cursor:pointer;display:flex;align-items:center;gap:7px;transition:all .15s}
.connected-badge:hover{border-color:var(--red);color:var(--red)}

/* ── Misc ── */
.dot{display:inline-block;width:6px;height:6px;border-radius:50%;margin-right:5px}
.dot-green{background:var(--green);box-shadow:0 0 6px var(--green)}.dot-blue{background:var(--blue)}
.dot-pulse{animation:dotpulse 2s infinite}@keyframes dotpulse{0%,100%{opacity:1}50%{opacity:.3}}

/* ── Footer ── */
footer{border-top:1px solid var(--border);padding:28px 32px;display:flex;justify-content:space-between;align-items:center}
.footer-left{font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--muted)}
.footer-links{display:flex;gap:24px}
.footer-links a{font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--muted);text-decoration:none}.footer-links a:hover{color:var(--text)}

/* ── Responsive ── */
@media(max-width:900px){.metrics{grid-template-columns:1fr 1fr}.about-grid{grid-template-columns:1fr}.user-balance-grid{grid-template-columns:1fr 1fr}.deposit-steps{grid-template-columns:1fr}}
@media(max-width:600px){.metrics{grid-template-columns:1fr}.user-balance-grid{grid-template-columns:1fr}nav{padding:0 16px}.hero,.about,.section{padding-left:16px;padding-right:16px}.hero-title{font-size:28px;letter-spacing:-1px}.nav-links{display:none}footer{flex-direction:column;gap:14px;text-align:center}}
.asset-row-list{border:1px solid var(--border);border-radius:12px;overflow:hidden;background:var(--surface)}
.asset-row{display:flex;align-items:center;justify-content:space-between;padding:16px 20px;cursor:pointer;transition:background .15s;border-bottom:1px solid var(--border)}
.asset-row:last-child{border-bottom:none}
.asset-row:hover{background:var(--surface2)}
.asset-row.expanded{background:var(--surface2)}
.asset-row-left{display:flex;align-items:center;gap:12px;min-width:0}
.asset-icon{width:36px;height:36px;border-radius:50%;background:var(--blue-dim);display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:700;color:var(--blue);flex-shrink:0}
.asset-name{font-weight:600;font-size:14px}
.asset-sub{font-size:11px;color:var(--muted2);font-family:'IBM Plex Mono',monospace}
.asset-row-right{display:flex;align-items:center}
.asset-stats{display:flex;gap:28px;align-items:center}
.asset-stat{text-align:right}
.asset-stat-label{font-size:9.5px;color:var(--muted2);text-transform:uppercase;letter-spacing:.05em;margin-bottom:2px}
.asset-stat-value{font-family:'IBM Plex Mono',monospace;font-size:13px;font-weight:600}
.asset-chevron{transition:transform .2s;color:var(--muted2);margin-left:18px;font-size:12px}
.asset-chevron.open{transform:rotate(180deg)}
.asset-panel{max-height:0;overflow:hidden;transition:max-height .3s ease}
.asset-panel.open{max-height:900px}
.asset-panel-inner{padding:22px;border-top:1px solid var(--border)}
@media(max-width:640px){.asset-stats{gap:12px}.asset-stat-label{display:none}.asset-row{padding:14px}}
</style>
</head>

const SUI_GRAPHQL = 'https://graphql.testnet.sui.io/graphql';

async function graphqlQuery(query, variables) {
  const r = await fetch(SUI_GRAPHQL, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ query, variables }),
  });
  const body = await r.json();
  if (body.errors) throw new Error('GraphQL error: ' + JSON.stringify(body.errors));
  return body.data;
}

// El JSON-RPC publico de testnet fue dado de baja por Mysten (semana del 6 de
// julio de 2026). Esta funcion mantiene la MISMA firma y forma de respuesta
// que el rpc() viejo (JSON-RPC), pero internamente usa GraphQL — asi el
// resto del codigo no necesita cambios.
async function rpc(method, params) {
  if (method === 'suix_getBalance') {
    const [address, coinType] = params;
    const data = await graphqlQuery(
      `query($addr: SuiAddress!, $type: String!) { address(address: $addr) { balance(coinType: $type) { totalBalance } } }`,
      { addr: address, type: coinType }
    );
    return { totalBalance: data?.address?.balance?.totalBalance ?? '0' };
  }

  if (method === 'suix_getCoins') {
    const [address, coinType, , limit] = params;
    const fullCoinType = `0x2::coin::Coin<${coinType}>`;
    const data = await graphqlQuery(
      `query($addr: SuiAddress!, $type: String!, $first: Int) { address(address: $addr) { objects(filter: { type: $type }, first: $first) { nodes { address contents { json } } } } }`,
      { addr: address, type: fullCoinType, first: limit ?? 10 }
    );
    const nodes = data?.address?.objects?.nodes ?? [];
    return {
      data: nodes.map(n => ({
        coinObjectId: n.address,
        balance: n.contents?.json?.balance ?? '0',
        coinType,
      })),
    };
  }

  if (method === 'sui_getObject') {
    const [objectId] = params;
    const data = await graphqlQuery(
      `query($id: SuiAddress!) { object(address: $id) { asMoveObject { contents { json } } } }`,
      { id: objectId }
    );
    const fields = data?.object?.asMoveObject?.contents?.json;
    if (!fields) return { data: null };
    return { data: { content: { fields } } };
  }

  if (method === 'suix_queryEvents') {
    // NOTA: filtrar eventos por tipo (events(filter:{type})) esta roto en
    // el GraphQL de testnet ahora mismo (bug Mysten/sui#24094). Workaround:
    // filtramos transacciones que llamaron a la funcion que emite el evento.
    const [filter, , limit] = params;
    const eventType = filter?.MoveEventType ?? '';
    const [pkg, , evName] = eventType.split('::');
    // Mapeo evento -> funcion que lo emite (los unicos que usa este frontend)
    const functionByEvent = {
      MintEvent: 'mint_with_authority',
    };
    const fn = functionByEvent[evName];
    if (!fn) return { data: [] };

    const data = await graphqlQuery(
      `query($fn: String!, $last: Int) { transactions(filter: { function: $fn }, last: $last) { nodes { digest effects { events { nodes { contents { type { repr } json } } } } } } }`,
      { fn: `${pkg}::arst::${fn}`, last: limit ?? 20 }
    );

    const found = [];
    for (const node of data?.transactions?.nodes ?? []) {
      for (const ev of node.effects?.events?.nodes ?? []) {
        if (ev.contents?.type?.repr === eventType) {
          found.push({ id: { txDigest: node.digest, eventSeq: '0' }, parsedJson: ev.contents.json });
        }
      }
    }
    return { data: found };
  }

  if (method === 'suix_getOwnedObjects') {
    const [address, opts] = params;
    const structType = opts?.filter?.StructType;
    if (!structType) return { data: [] };
    const data = await graphqlQuery(
      `query($addr: SuiAddress!, $type: String!) { address(address: $addr) { objects(filter: { type: $type }, first: 10) { nodes { address contents { json } } } } }`,
      { addr: address, type: structType }
    );
    const nodes = data?.address?.objects?.nodes ?? [];
    return {
      data: nodes.map(n => ({
        data: { objectId: n.address, content: { fields: n.contents?.json ?? {} } },
      })),
    };
  }

  throw new Error(`Metodo RPC no migrado a GraphQL: ${method}`);
}

  // ── Wallet detection via Wallet Standard ──────────────────────────────────────
  let _registeredWallets = [];

  function initWalletStandard() {
    // Escuchar wallets que se registran via Wallet Standard
    const handler = (event) => {
      const wallet = event.detail;
      if (!wallet?.name) return;
      // Solo wallets SUI (que soporten sui: chains)
      const chains = wallet.chains || wallet['#t']?.chains || [];
      const isSui = JSON.stringify(chains).includes('sui:') ||
        wallet.name === 'Slush' ||
        wallet.name === 'Suiet' ||
        wallet.name === 'Nightly';
      if (!isSui) return;
      if (!_registeredWallets.find(w => w.name === wallet.name)) {
        _registeredWallets.push({
          name: wallet.name,
          icon: wallet.icon || wallet['#s'] || null,
          ref: wallet,
          type: 'standard'
        });
      }
    };
    window.addEventListener('wallet-standard:register-wallet', handler);

    // Disparar evento para que las wallets ya instaladas se registren
    window.dispatchEvent(new CustomEvent('wallet-standard:app-ready', {
      detail: {
        register: (wallet) => {
          if (!wallet?.name) return;
          const isSui = wallet.name === 'Slush' || wallet.name === 'Suiet' || wallet.name === 'Nightly' || wallet.name === 'Noir Wallet' || wallet.name === 'Phantom';
          if (!isSui) return;
          if (!_registeredWallets.find(w => w.name === wallet.name)) {
            _registeredWallets.push({ name: wallet.name, icon: wallet.icon || null, ref: wallet, type: 'standard' });
          }
        }
      }
    }));
  }

  // Llamar al init
  initWalletStandard();

  function getWallets() {
    // También agregar Nightly y Noir si están en window directamente
    if (window.nightly?.sui && !_registeredWallets.find(w => w.name === 'Nightly')) {
      _registeredWallets.push({ name: 'Nightly', icon: '🌙', ref: window.nightly.sui, type: 'nightly' });
    }
    
    return _registeredWallets;
  }

  async function connectWallet(wallet, onSuccess, setErr) {
    try {
      const { ref, type, name } = wallet;

      if (type === 'nightly') {
        await ref.connect?.({ network: 'sui:testnet' });
        const accs = await ref.getAccounts?.() || ref.accounts || [];
        const addr = accs[0]?.address || accs[0];
        if (addr) { onSuccess({ address: addr, ref, type }); return; }
      }

      if (type === 'noir') {
        await ref.connect?.({ network: 'sui:testnet' });
        const accs = await ref.getAccounts?.() || [];
        const addr = accs[0]?.address || accs[0];
        if (addr) { onSuccess({ address: addr, ref, type }); return; }
      }

      // Slush, Suiet, Phantom y otras wallets Wallet Standard
      if (type === 'standard') {
        const connectFeat = ref.features?.['standard:connect'] || ref['#e']?.['standard:connect'];
        if (connectFeat) {
          const r = await connectFeat.connect?.({
            silent: false,
            permissions: ['viewAccount', 'suggestTransactions']
          });
          // Slush guarda address como getter en el prototype
          const acc = r?.accounts?.[0];
          const addr = acc?.address || r?.accounts?.[0]?.address;
          if (addr) { onSuccess({ address: addr, ref, type: 'standard', name, account: acc }); return; }

          // Fallback: buscar en wallet.accounts
          const walletAcc = ref.accounts?.[0];
          const walletAddr = walletAcc?.address;
          if (walletAddr) { onSuccess({ address: walletAddr, ref, type: 'standard', name, account: walletAcc }); return; }
        }
        if (ref.connect) {
          const r = await ref.connect({
            silent: false,
            permissions: ['viewAccount', 'suggestTransactions']
          });
          const acc = r?.accounts?.[0] || ref.accounts?.[0];
          const addr = acc?.address;
          if (addr) { onSuccess({ address: addr, ref, type: 'standard', name }); return; }
        }
      }

      setErr('No se pudo obtener la dirección. Ingresala manualmente.');
    } catch (e) {
      setErr('Error: ' + (e.message || 'desconocido') + '. Ingresá tu dirección manualmente.');
    }
  }

  // ── SendTab ───────────────────────────────────────────────────────────────────
  function SendTab({ address, balance, wallet,lang }) {
    const [to, setTo] = useState('');
    const [amount, setAmount] = useState('');
    const [status, setStatus] = useState('idle');
    const [txDigest, setTxDigest] = useState('');
    const [errMsg, setErrMsg] = useState('');

    if (!address) return h('div', { className: 'panel' }, h('div', { className: 'wallet-prompt' },
      h('div', { className: 'wallet-icon' }, '📤'),
      h('h3', null, tr(lang, 'send_no_wallet_title')),
      h('p', null, tr(lang, 'send_no_wallet_desc'))
    ));

    const preview = parseFloat(amount) || 0;

    const submit = async () => {
      if (!to || !to.startsWith('0x') || to.length !== 66) { alert(tr(lang, 'send_err_invalid_addr')); return; }
      if (to === address) { alert(tr(lang, 'send_err_self')); return; }
      if (!preview || preview <= 0) { alert(tr(lang, 'send_err_invalid_amount')); return; }
      if (preview > balance) { alert(tr(lang, 'send_err_insufficient')); return; }
      if (!wallet?.ref && wallet?.type !== 'manual') { alert(tr(lang, 'send_err_no_wallet')); return; }

      setStatus('building'); setErrMsg('');

      try {
        const amountUnits = Math.round(preview * 100);

        // Obtener coins ARSt del usuario
        const coinsRes = await rpc('suix_getCoins', [address, ARST_TYPE, null, 10]);
        const coins = coinsRes?.data || [];
        if (!coins.length) throw new Error(tr(lang, 'send_err_no_coins'));

        const sorted = coins.sort((a, b) => Number(BigInt(b.balance) - BigInt(a.balance)));
        // Intentar encontrar un coin con suficiente balance
        let coin = sorted.find(c => parseInt(c.balance) >= amountUnits);

        // Si no hay uno solo suficiente, mergear coins en la tx
        if (!coin) {
          const totalBalance = coins.reduce((sum, c) => sum + parseInt(c.balance), 0);
          if (totalBalance < amountUnits) throw new Error(tr(lang, 'send_err_insufficient'));
          // Usar el coin más grande como base y mergear los demás
          coin = sorted[0];
        }

        setStatus('signing');

        let result; 
        const ref = wallet.ref;
        const type = wallet.type;

        // Nightly tiene su propio método de transferencia
        if (type === 'nightly') {
          const { Transaction } = await import('https://esm.sh/@mysten/sui@1.21.1/transactions');
          const tx = new Transaction();
          tx.setSender(address);
          tx.setGasBudget(10_000_000);

          // Mergear coins si el principal no alcanza
          if (parseInt(coin.balance) < amountUnits && sorted.length > 1) {
            const otherCoins = sorted.slice(1).map(c => tx.object(c.coinObjectId));
            tx.mergeCoins(tx.object(coin.coinObjectId), otherCoins);
          }

          if (parseInt(coin.balance) < amountUnits || sorted.length > 1) {
            const [split] = tx.splitCoins(tx.object(coin.coinObjectId), [tx.pure.u64(amountUnits)]);
            tx.transferObjects([split], tx.pure.address(to));
          } else {
            tx.transferObjects([tx.object(coin.coinObjectId)], tx.pure.address(to));
          }

          result = await ref.signAndExecuteTransaction({
            transaction: tx,
            chain: 'sui:testnet',
            options: { showEffects: true }
          });
         } else if (type === 'standard') {
          const { Transaction } = await import('https://esm.sh/@mysten/sui@1.21.1/transactions');
          const tx = new Transaction();
          tx.setSender(address);
          tx.setGasBudget(10_000_000);

          // Mergear coins si el principal no alcanza
          if (parseInt(coin.balance) < amountUnits && sorted.length > 1) {
            const otherCoins = sorted.slice(1).map(c => tx.object(c.coinObjectId));
            tx.mergeCoins(tx.object(coin.coinObjectId), otherCoins);
          }

          if (parseInt(coin.balance) < amountUnits || sorted.length > 1) {
            const [split] = tx.splitCoins(tx.object(coin.coinObjectId), [tx.pure.u64(amountUnits)]);
            tx.transferObjects([split], tx.pure.address(to));
          } else {
            tx.transferObjects([tx.object(coin.coinObjectId)], tx.pure.address(to));
          }

          const feat = ref.features?.['sui:signAndExecuteTransaction'] ||
            ref['#e']?.['sui:signAndExecuteTransaction'];
          if (feat) {
            // Pasar el account explícitamente para Slush
            const account = ref.accounts?.[0];
            result = await feat.signAndExecuteTransaction?.({
              transaction: tx,
              account,           // ← agregar esto
              chain: 'sui:testnet',
              options: { showEffects: true }
            });
          }
        }

        // Slush puede devolver el digest directamente o dentro de effects
        if (!result && result !== null) throw new Error(tr(lang, 'send_err_no_support'));

        const digest = result?.digest || result?.effects?.transactionDigest || result?.transaction?.txid || 'completado';
        setTxDigest(digest || 'ok');
        setStatus('done');

      } catch (e) {
        console.error('Error envío:', e);
        setErrMsg(e.message || 'Error desconocido');
        setStatus('error');
      }
    };

   

    if (status === 'done') return h('div', { className: 'panel' }, h('div', { className: 'wallet-prompt' },
      h('div', { className: 'wallet-icon' }, '✅'),
      h('h3', null, tr(lang, 'send_success_title')),
      h('p', null, tr(lang, 'send_success_desc', { amount: fmt(preview, 2), addr: shortAddr(to) })),
      txDigest && h('a', { className: 'tx-link', href: `${EXPLORER}/txblock/${txDigest}`, target: '_blank', style: { display: 'block', marginTop: '12px' } }, tr(lang, 'send_explorer')),
      h('button', { className: 'btn btn-outline', style: { marginTop: '20px' }, onClick: () => { setStatus('idle'); setTo(''); setAmount(''); } }, tr(lang, 'send_new'))
    ));

    const btnLabel = {
      idle: tr(lang, 'withdraw_btn'),
      signing: tr(lang, 'withdraw_signing'),
      sending: tr(lang, 'withdraw_sending'),
      error: tr(lang, 'withdraw_retry')
    }[status] || tr(lang, 'withdraw_btn');

    return h('div', { className: 'panel' },
      h('div', { className: 'gap3' },
        h('div', { className: 'balance-display' },
          h('div', null,
            h('div', { className: 'bl' }, tr(lang, 'send_balance_label')),
            h('div', { className: 'bv' }, fmt(balance, 2) + ' ARSt')
          )
        ),
        h('div', null,
          h('div', { className: 'field-label' }, tr(lang, 'send_to_label')),
          h('input', {
            className: 'field-input',
            type: 'text',
            placeholder: '0x...',
            value: to,
            onChange: e => setTo(e.target.value.trim())
          }),
          h('div', { className: 'field-hint' }, tr(lang, 'send_to_hint'))
        ),
        h('div', null,
          h('div', { className: 'field-label' }, tr(lang, 'send_amount_label') ),
          h('input', {
            className: 'field-input',
            type: 'number',
            placeholder: '100',
            min: 0.01,
            step: 1,
            value: amount,
            onChange: e => setAmount(e.target.value)
          })
        ),
        h('div', { className: 'amount-preview' },
          h('span', { className: 'lbl' }, tr(lang, 'send_preview')),
          h('span', { className: 'val' }, preview > 0 ? fmt(preview, 2) + ' ARSt' : '— ARSt')
        ),
        errMsg && h('div', { className: 'alert alert-error' }, '❌ ' + errMsg),
        h('div', { className: 'alert alert-info' }, tr(lang, 'send_info')),
        h('button', {
          className: 'btn btn-primary',
          style: { width: '100%', padding: '14px' },
          onClick: submit,
          disabled: status === 'building' || status === 'signing'
        }, btnLabel)
      )
    );
  }

function WithdrawTab({address,balance,wallet,oraclePrice,lang}) {
  const [amount,setAmount]=useState('');const [cbu,setCbu]=useState('');
  const [status, setStatus] = useState('idle');
  const [txDigest, setTxDigest] = useState('');
  const [errMsg, setErrMsg] = useState('');

  if (!address) return h('div', { className: 'panel' }, h('div', { className: 'wallet-prompt' }, h('div', { className: 'wallet-icon' }, '🏦'), h('h3', null, tr(lang, 'withdraw_no_wallet_title')), h('p', null, tr(lang, 'withdraw_no_wallet_desc'))));
  const preview=parseFloat(amount)||0;
  const previewUSD=oraclePrice>0?(preview/oraclePrice).toFixed(2):'—';
  const submit=async()=>{
    if(!preview||preview<=0){alert('Ingresá un monto válido');return;}
    if(preview>balance){alert('Saldo insuficiente');return;}
    if(!cbu||cbu.length!==22||!/^\d{22}$/.test(cbu)){alert('CBU inválido. Debe tener exactamente 22 dígitos numéricos.');return;}
    if(!wallet?.ref&&wallet?.type!=='manual'){alert('Wallet no disponible. Reconectá tu wallet.');return;}
    setStatus('signing');setErrMsg('');
    try{
      const amountUnits=Math.round(preview*100);
      const res=await fetch(`${BACKEND}/api/create-withdrawal`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({address,amountUnits,cbu,amountArst:preview})});
      if(!res.ok) throw new Error('Error al preparar el retiro');
      const {txBytes}=await res.json();
      setStatus('sending');
      // Firmar con wallet
      let signedTx;const ref=wallet?.ref;const type=wallet?.type;
      if(type==='nightly') signedTx=await ref.signAndExecuteTransaction?.({transactionBlock:txBytes,options:{showEffects:true}});
      else if(type==='noir') signedTx=await ref.signAndExecuteTransactionBlock?.({transactionBlock:txBytes,options:{showEffects:true}});
      else if(type==='standard'){const feat=ref?.features?.['sui:signAndExecuteTransaction'];if(feat) signedTx=await feat.signAndExecuteTransaction({transaction:txBytes,options:{showEffects:true}});}
      else{await fetch(`${BACKEND}/api/withdrawal-request`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({address,amountArst:preview,cbu})});setStatus('done');setTxDigest('manual');return;}
      setTxDigest(signedTx?.digest||'ok');setStatus('done');
    }catch(e){setErrMsg(e.message||'Error desconocido');setStatus('error');}
  };
  if(status==='done') return h('div',{className:'panel'},h('div',{className:'wallet-prompt'},
    h('div',{className:'wallet-icon'},'✅'),
    h('h3', null, txDigest === 'manual' ? tr(lang, 'withdraw_success_manual_title') : tr(lang, 'withdraw_success_title')),
    h('p', null, txDigest === 'manual'
      ? tr(lang, 'withdraw_success_manual_desc', { amount: fmt(preview), cbu })
      : tr(lang, 'withdraw_success_desc', { amount: fmt(preview) })),
    txDigest&&txDigest!=='manual'&&h('a',{className:'tx-link',href:`${EXPLORER}/txblock/${txDigest}`,target:'_blank',style:{display:'block',marginTop:'12px'}},tr(lang,'withdraw_explorer')),
    h('button', { className: 'btn btn-outline', style: { marginTop: '20px' }, onClick: () => { setStatus('idle'); setAmount(''); setCbu(''); } }, tr(lang,'withdraw_new'))
  ));
  const btnLabel={idle:'Solicitar retiro',signing:'Esperando firma...',sending:'Enviando...',error:'Reintentar'}[status]||'Solicitar retiro';
  return h('div',{className:'panel'},
    h('div',{className:'gap3'},
      h('div',{className:'balance-display'},
        h('div',null,h('div',{className:'bl'},tr(lang,'withdraw_balance_label')),h('div',{className:'bv'},fmt(balance,2)+' ARSt'),h('div',{className:'balance-usd'},'≈ $'+fmt(balance)+' ARS'+(oraclePrice>0?' · ≈ USD '+fmtUSD(balance/oraclePrice):''))),
        h('button',{className:'btn btn-outline',style:{fontSize:'11px',padding:'6px 14px'},onClick:()=>setAmount(String(balance))},tr(lang,'withdraw_max'))
      ),
      h('div',null,
        h('div',{className:'field-label'},tr(lang,'withdraw_amount_label')),
        h('input',{className:'field-input',type:'number',placeholder:'500',min:1,value:amount,onChange:e=>setAmount(e.target.value)})
      ),
      h('div',null,
        h('div',{className:'field-label'}, tr(lang, 'withdraw_cbu_label')),
        h('input',{className:'field-input',type:'text',placeholder:'0000000000000000000000',maxLength:22,value:cbu,onChange:e=>setCbu(e.target.value.replace(/\D/g,''))}),
        h('div',{className:'field-hint'}, tr(lang, 'withdraw_cbu_hint'))
      ),
      h('div',{className:'amount-preview'},h('span',{className:'lbl'},tr(lang,'withdraw_preview')),h('span',{className:'val'},preview>0?'$'+fmt(preview)+' ARS'+(oraclePrice>0?' (≈ USD '+fmtUSD(preview/oraclePrice)+')':''):'— ARS')),
      errMsg&&h('div',{className:'alert alert-error'},'❌ '+errMsg),

      h('button',{className:'btn btn-primary',style:{width:'100%',padding:'14px'},onClick:submit,disabled:status==='signing'||status==='sending'},btnLabel)

const STAKING_PACKAGE_ID = '0x414c031658b26de78bcfa3b39af4a977d9f6214fe7bd3d73ba7886a344e2a4ea';
const STAKING_POOL_ID    = '0x6a27ab0c623a3e8fcd2d33915988f5d1dd1284c68133d239fa7bac4be9b88e11';
const SUI_CLOCK_ID       = '0x6';

function estimateReward(principal, rateBps, stakedAtMs) {
  const elapsedMs = Date.now() - stakedAtMs;
  if (elapsedMs <= 0) return 0;
  const numerator = BigInt(principal) * BigInt(rateBps) * BigInt(elapsedMs);
  const denominator = 10000n * 31536000000n;
  return Number(numerator / denominator);
}

function StakingTab({ address, balance, wallet, lang }) {
  const [poolInfo, setPoolInfo] = useState(null);
  const [position, setPosition] = useState(null);
  const [pendingRequest, setPendingRequest] = useState(null);
  const [amount, setAmount] = useState('');
  const [status, setStatus] = useState('idle');
  const [txDigest, setTxDigest] = useState('');
  const [errMsg, setErrMsg] = useState('');

  const loadAll = async () => {
    try {
      const poolRes = await rpc('sui_getObject', [STAKING_POOL_ID, { showContent: true }]);
      const pf = poolRes?.data?.content?.fields;
      if (pf) setPoolInfo({
        totalStaked: parseInt(pf.total_staked ?? '0'),
        rateBps: parseInt(pf.annual_rate_bps ?? '0'),
        paused: pf.paused ?? false,
      });
    } catch (e) { console.error(e); }

    if (!address) return;

    try {
      const posRes = await rpc('suix_getOwnedObjects', [address, {
        filter: { StructType: `${STAKING_PACKAGE_ID}::staking::StakePosition` },
        options: { showContent: true },
      }]);
      const posObj = posRes?.data?.[0];
      if (posObj) {
        const f = posObj.data.content.fields;
        setPosition({
          objectId: posObj.data.objectId,
          principal: parseInt(f.principal ?? '0'),
          stakedAtMs: parseInt(f.staked_at_ms ?? '0'),
          claimedRewards: parseInt(f.claimed_rewards ?? '0'),
        });
      } else {
        setPosition(null);
      }
    } catch (e) { console.error(e); }

    // Buscar solicitud pendiente (StakingRequest es un objeto compartido,
    // hay que filtrar por el campo owner del contenido, no por owner de Sui).
    try {
      const r = await fetch(SUI_GRAPHQL, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          query: `query($type: String!) { objects(filter: { type: $type }, first: 20) { nodes { address contents { json } } } }`,
          variables: { type: `${STAKING_PACKAGE_ID}::staking::StakingRequest` },
        }),
      });
      const body = await r.json();
      const nodes = body?.data?.objects?.nodes ?? [];
      const mine = nodes.find(n => n.contents?.json?.owner === address);
      setPendingRequest(mine ? { objectId: mine.address, isFullUnstake: mine.contents.json.is_full_unstake } : null);
    } catch (e) { console.error(e); }
  };

  useEffect(() => { loadAll(); const t = setInterval(loadAll, 15000); return () => clearInterval(t); }, [address]);

  if (!address) return h('div', { className: 'panel' }, h('div', { className: 'wallet-prompt' },
    h('div', { className: 'wallet-icon' }, '🌱'),
    h('h3', null, tr(lang, 'staking_no_wallet_title')),
    h('p', null, tr(lang, 'staking_no_wallet_desc'))
  ));

  const preview = parseFloat(amount) || 0;
  const estReward = position ? estimateReward(position.principal, poolInfo?.rateBps ?? 0, position.stakedAtMs) : 0;

  async function signAndExec(tx) {
    const ref = wallet.ref; const type = wallet.type;
    if (type === 'nightly') {
      return await ref.signAndExecuteTransaction({ transaction: tx, chain: 'sui:testnet', options: { showEffects: true } });
    }
    if (type === 'standard') {
      const feat = ref?.features?.['sui:signAndExecuteTransaction'];
      if (!feat) throw new Error(tr(lang, 'send_err_no_wallet'));
      return await feat.signAndExecuteTransaction({ transaction: tx, chain: 'sui:testnet', options: { showEffects: true } });
    }
    throw new Error(tr(lang, 'send_err_no_wallet'));
  }

  const doStake = async () => {
    if (!preview || preview <= 0) { alert(tr(lang, 'send_err_invalid_amount')); return; }
    if (preview > balance) { alert(tr(lang, 'send_err_insufficient')); return; }
    if (!wallet?.ref) { alert(tr(lang, 'send_err_no_wallet')); return; }

    setStatus('signing'); setErrMsg('');
    try {
      const amountUnits = Math.round(preview * 100);
      const coinsRes = await rpc('suix_getCoins', [address, ARST_TYPE, null, 10]);
      const coins = coinsRes?.data || [];
      if (!coins.length) throw new Error(tr(lang, 'send_err_no_coins'));
      const sorted = coins.sort((a, b) => Number(BigInt(b.balance) - BigInt(a.balance)));
      let coin = sorted.find(c => parseInt(c.balance) >= amountUnits);

      const { Transaction } = await import('https://esm.sh/@mysten/sui@1.21.1/transactions');
      const tx = new Transaction();
      tx.setSender(address);
      tx.setGasBudget(10_000_000);

      let coinArg;
      if (coin) {
        if (parseInt(coin.balance) === amountUnits) {
          coinArg = tx.object(coin.coinObjectId);
        } else {
          const [split] = tx.splitCoins(tx.object(coin.coinObjectId), [tx.pure.u64(amountUnits)]);
          coinArg = split;
        }
      } else {
        const base = sorted[0];
        const others = sorted.slice(1).map(c => tx.object(c.coinObjectId));
        if (others.length) tx.mergeCoins(tx.object(base.coinObjectId), others);
        const [split] = tx.splitCoins(tx.object(base.coinObjectId), [tx.pure.u64(amountUnits)]);
        coinArg = split;
      }

      tx.moveCall({
        target: `${STAKING_PACKAGE_ID}::staking::stake`,
        arguments: [tx.object(STAKING_POOL_ID), coinArg, tx.object(SUI_CLOCK_ID)],
      });

      const result = await signAndExec(tx);
      setTxDigest(result?.digest || 'ok');
      setStatus('done');
      setAmount('');
      loadAll();
    } catch (e) {
      setErrMsg(e.message || 'Error desconocido');
      setStatus('error');
    }
  };

  const doRequest = async (isFullUnstake) => {
    if (!position || !wallet?.ref) return;
    setStatus('signing'); setErrMsg('');
    try {
      const { Transaction } = await import('https://esm.sh/@mysten/sui@1.21.1/transactions');
      const tx = new Transaction();
      tx.setSender(address);
      tx.setGasBudget(10_000_000);
      tx.moveCall({
        target: `${STAKING_PACKAGE_ID}::staking::create_staking_request`,
        arguments: [
          tx.object(STAKING_POOL_ID),
          tx.object(position.objectId),
          tx.pure.bool(isFullUnstake),
          tx.object(SUI_CLOCK_ID),
        ],
      });
      const result = await signAndExec(tx);
      setTxDigest(result?.digest || 'ok');
      setStatus('done');
      loadAll();
    } catch (e) {
      setErrMsg(e.message || 'Error desconocido');
      setStatus('error');
    }
  };

  const doCancel = async () => {
    if (!pendingRequest || !wallet?.ref) return;
    setStatus('signing'); setErrMsg('');
    try {
      const { Transaction } = await import('https://esm.sh/@mysten/sui@1.21.1/transactions');
      const tx = new Transaction();
      tx.setSender(address);
      tx.setGasBudget(10_000_000);
      tx.moveCall({
        target: `${STAKING_PACKAGE_ID}::staking::cancel_staking_request`,
        arguments: [tx.object(pendingRequest.objectId)],
      });
      const result = await signAndExec(tx);
      setTxDigest(result?.digest || 'ok');
      setStatus('done');
      loadAll();
    } catch (e) {
      setErrMsg(e.message || 'Error desconocido');
      setStatus('error');
    }
  };

  if (status === 'done') return h('div', { className: 'panel' }, h('div', { className: 'wallet-prompt' },
    h('div', { className: 'wallet-icon' }, '✅'),
    h('h3', null, tr(lang, 'staking_success_title')),
    txDigest && txDigest !== 'ok' && h('a', { className: 'tx-link', href: `${EXPLORER}/txblock/${txDigest}`, target: '_blank', style: { display: 'block', marginTop: '12px' } }, tr(lang, 'withdraw_explorer')),
    h('button', { className: 'btn btn-outline', style: { marginTop: '20px' }, onClick: () => setStatus('idle') }, tr(lang, 'withdraw_new'))
  ));

  const btnLabel = { idle: tr(lang, 'staking_stake_btn'), signing: tr(lang, 'staking_signing'), error: tr(lang, 'staking_retry') }[status] || tr(lang, 'staking_stake_btn');

  return h('div', { className: 'panel' },
    h('div', { className: 'gap3' },
      poolInfo && h('div', { className: 'balance-display' },
        h('div', null,
          h('div', { className: 'bl' }, tr(lang, 'staking_pool_label')),
          h('div', { className: 'bv' }, (poolInfo.rateBps / 100).toFixed(2) + '% ' + tr(lang, 'staking_apy')),
          h('div', { className: 'balance-usd' }, tr(lang, 'staking_total_staked') + ': ' + fmt(poolInfo.totalStaked / 100, 2) + ' ARSt')
        )
      ),

      // Posicion actual
      position && h('div', { className: 'alert alert-warn' },
        h('div', null, tr(lang, 'staking_your_position') + ': ' + fmt(position.principal / 100, 2) + ' ARSt'),
        h('div', null, tr(lang, 'staking_est_reward') + ': ' + fmt(estReward / 100, 2) + ' ARSt'),
        !pendingRequest && h('div', { style: { display: 'flex', gap: '8px', marginTop: '10px' } },
          h('button', { className: 'btn btn-outline', style: { flex: 1 }, onClick: () => doRequest(false), disabled: status === 'signing' }, tr(lang, 'staking_claim_btn')),
          h('button', { className: 'btn btn-primary', style: { flex: 1 }, onClick: () => doRequest(true), disabled: status === 'signing' }, tr(lang, 'staking_unstake_btn'))
        ),
        pendingRequest && h('div', { style: { marginTop: '10px' } },
          h('div', null, '⏳ ' + tr(lang, pendingRequest.isFullUnstake ? 'staking_pending_unstake' : 'staking_pending_claim')),
          h('button', { className: 'btn btn-outline', style: { marginTop: '8px' }, onClick: doCancel, disabled: status === 'signing' }, tr(lang, 'staking_cancel_btn'))
        )
      ),

      // Formulario de deposito
      !position && h('div', null,
        h('div', { className: 'balance-display' },
          h('div', null, h('div', { className: 'bl' }, tr(lang, 'staking_available_label')), h('div', { className: 'bv' }, fmt(balance, 2) + ' ARSt')),
          h('button', { className: 'btn btn-outline', style: { fontSize: '11px', padding: '6px 14px' }, onClick: () => setAmount(String(balance)) }, tr(lang, 'withdraw_max'))
        ),
        h('div', { style: { marginTop: '12px' } },
          h('div', { className: 'field-label' }, tr(lang, 'staking_amount_label')),
          h('input', { className: 'field-input', type: 'number', placeholder: '100', min: 1, value: amount, onChange: e => setAmount(e.target.value) })
        ),
        errMsg && h('div', { className: 'alert alert-error' }, '❌ ' + errMsg),
        h('button', { className: 'btn btn-primary', style: { width: '100%', padding: '14px', marginTop: '12px' }, onClick: doStake, disabled: status === 'signing' }, btnLabel)
      )
    )
  );
}

// ── HistoryTab ────────────────────────────────────────────────────────────────
function HistoryTab({address,oraclePrice,lang}) {
  const [events,setEvents]=useState([]);const [loading,setLoading]=useState(false);
  useEffect(()=>{
    if(!address)return;setLoading(true);
    rpc('suix_queryEvents',[{MoveEventType:`${PACKAGE_ID}::arst::MintEvent`},null,20,false])
      .then(d=>setEvents((d?.data||[]).filter(e=>e.parsedJson?.recipient===address)))
      .catch(console.error).finally(()=>setLoading(false));
  },[address]);
  if(!address) return h('div',{className:'panel'},h('div',{className:'wallet-prompt'},h('div',{className:'wallet-icon'},'📋'),h('h3',null,tr(lang,'history_no_wallet_title')),h('p',null,tr(lang,'history_no_wallet_desc'))));
  if(loading) return h('div',{className:'panel'},h('div',{style:{textAlign:'center',padding:'48px',color:'var(--muted)',fontFamily:"'IBM Plex Mono',monospace",fontSize:'12px'}},tr(lang,'history_loading')));
  return h('div',{className:'panel',style:{padding:0,overflow:'hidden'}},
    h('table',{className:'history-table'},
      h('thead',null,h('tr',null,
  h('th',null,tr(lang,'history_th_date')),
  h('th',null,tr(lang,'history_th_type')),
  h('th',null,tr(lang,'history_th_arst')),
  h('th',null,tr(lang,'history_th_ars')),
  h('th',null,tr(lang,'history_th_status')),
  h('th',null,tr(lang,'history_th_tx'))
)),
      h('tbody',null,
        events.length===0
          ? h('tr',null,h('td',{colSpan:6,style:{textAlign:'center',color:'var(--muted)',padding:'48px'}},tr(lang,'history_empty')))
          : events.map((e,i)=>{
              const amount=parseInt(e.parsedJson?.amount??0)/100;
              const ts=new Date(parseInt(e.timestampMs)).toLocaleString('es-AR');
              const d=e.id?.txDigest??'';
              return h('tr',{key:i},
                h('td',null,ts),
                h('td',null,h('span',{className:'badge badge-mint'}, tr(lang, 'history_type_deposit'))),
                h('td',null,fmt(amount,2)),
                h('td',null,'$'+fmt(amount)),
                h('td',null,h('span',{className:'dot dot-green'}), tr(lang, 'history_status_done')),
                h('td',null,h('a',{className:'tx-link',href:`${EXPLORER}/txblock/${d}`,target:'_blank'},d.slice(0,10)+'...'))
              );
            })
      )
    )
  );
}

function App() {
  const [tab,setTab]=useState('deposit');
  const [showModal,setShowModal]=useState(false);
  const [wallet,setWallet]=useState(null);
  const [showDisconnect, setShowDisconnect] = useState(false);
  const address=wallet?.address||null;
  const [balance,setBalance]=useState(0);
  const [metrics,setMetrics]=useState({supply:0,reserve:0,collateral:0,paused:false,totalTx:0,auditAgo:'—'});
  const [oracle,setOracle]=useState({price:0,change:0,ts:0});
  const [lang, setLang] = useState(() => {
    const browserLang = navigator.language?.slice(0, 2).toLowerCase();
    return browserLang === 'en' ? 'en' : 'es';
  });

  // Cargar métricas
  useEffect(()=>{
    const load=async()=>{
      try{
        const r=await rpc('sui_getObject',[RESERVE_ID,{showContent:true}]);
        const f=r?.data?.content?.fields;
        if(f){
          const supply=parseInt(f.arst_supply??0)/100;
          const reserve=parseInt(f.ars_reserve_centavos??0)/100;
          const collateral=supply>0?(reserve/supply)*100:100;
          setMetrics(m=>({...m,supply,reserve,collateral,paused:f.paused??false}));
        }
      }catch(e){}
      try{
        const r2=await rpc('sui_getObject',[PRICEFEED,{showContent:true}]);
        const f2=r2?.data?.content?.fields;
        if(f2){
          const price=parseInt(f2.price_ars_per_usd??0)/1_000_000;
          const prev=parseInt(f2.prev_price_ars_per_usd??0)/1_000_000;
          const ts=parseInt(f2.last_update_ms??0);
          setOracle({price,change:prev>0?((price-prev)/prev*100):0,ts});
        }
      }catch(e){}
      // Total transacciones
      try{
        const r3=await rpc('suix_queryEvents',[{MoveEventType:`${PACKAGE_ID}::arst::MintEvent`},null,1,false]);
        // Aproximación: usar el cursor del último evento
      }catch(e){}
    };
    load();const t=setInterval(load,30000);return()=>clearInterval(t);
  },[]);

  // Cargar balance
  useEffect(()=>{
    if(!address){setBalance(0);return;}
    const load=()=>rpc('suix_getBalance',[address,ARST_TYPE]).then(r=>setBalance(parseInt(r?.totalBalance??'0')/100)).catch(console.error);
    load();const t=setInterval(load,15000);return()=>clearInterval(t);
  },[address]);

  const connect=(w)=>{setWallet(w);setShowModal(false);};
  const disconnect=()=>{setWallet(null);setBalance(0);};

  const tsAgo=oracle.ts>0?Math.floor((Date.now()-oracle.ts)/60000):null;
  const tsLabel = tsAgo === null ? '—' :
    tsAgo < 1 ? tr(lang, 'hero_now') :
      tsAgo < 60 ? tr(lang, 'hero_min_ago', { n: tsAgo }) :

        console.log('render App', { tab, address, metrics, oracle });
  return h('div', null,
    showModal && h(WalletModal, { onConnect: connect, onClose: () => setShowModal(false), lang }),

    h('nav', null,

      h('div', { style: { display: 'flex', alignItems: 'center', gap: '32px' } },
        h('div', { className: 'nav-links' },
          h('a', { href: '#about', onClick: e => { e.preventDefault(); document.getElementById('about-section')?.scrollIntoView({ behavior: 'smooth' }) } }, tr(lang, 'nav_what')),
          h('a', { href: '#metrics', onClick: e => { e.preventDefault(); document.getElementById('metrics-section')?.scrollIntoView({ behavior: 'smooth' }) } }, tr(lang, 'nav_transparency')),
          h('a', { href: '#account', onClick: e => { e.preventDefault(); document.getElementById('account-section')?.scrollIntoView({ behavior: 'smooth' }) } }, tr(lang, 'nav_account')),
          h('a', { href: '#staking', onClick: e => { e.preventDefault(); document.getElementById('staking-section')?.scrollIntoView({ behavior: 'smooth' }) } }, tr(lang, 'nav_staking')),
          h('a', { href: '#banco', onClick: e => { e.preventDefault(); document.getElementById('banco-section')?.scrollIntoView({ behavior: 'smooth' }) } }, tr(lang, 'nav_bank'))

      tab === 'history' && h(HistoryTab, { address, oraclePrice: oracle.price, lang })
    ),

    h('div', { id: 'staking-section', className: 'section' },
      h('div', { className: 'section-title' }, tr(lang, 'staking_section_title')),
      h(StakingSection, { address, balance, wallet, lang })
    ),

    h('div', { id: 'banco-section', className: 'section' },
      h('div', { className: 'section-title' }, tr(lang, 'bank_section_title')),
      h(ExpandableRow, {
        icon: '$', name: 'USDC', sub: tr(lang, 'bank_coming_sub'),
        stats: [{ label: tr(lang, 'bank_status_label'), value: tr(lang, 'bank_coming_title'), color: 'var(--gold)' }]
      }, h('p', { style: { color: 'var(--muted2)', fontSize: '13px' } }, tr(lang, 'bank_coming_desc'))),
      h('div', { style: { height: '10px' } }),
      h(ExpandableRow, {
        icon: '₮', name: 'USDT', sub: tr(lang, 'bank_coming_sub'),
        stats: [{ label: tr(lang, 'bank_status_label'), value: tr(lang, 'bank_coming_title'), color: 'var(--gold)' }]
      }, h('p', { style: { color: 'var(--muted2)', fontSize: '13px' } }, tr(lang, 'bank_coming_desc')))
    ),

    h('footer', null,
      h('div', { className: 'footer-left' },
        h('span', { className: 'dot dot-green dot-pulse' }),
        tr(lang, 'footer_protocol'),
        h('a', { href: `${EXPLORER}/package/${PACKAGE_ID}`, target: '_blank', style: { color: 'var(--blue)', fontFamily: "'IBM Plex Mono',monospace", fontSize: '10px' } }, '0x1da2...9912e')
      ),
      h('div', { className: 'footer-links' },
        h('a', { href: EXPLORER, target: '_blank' }, tr(lang, 'footer_explorer')),
        h('a', { href: 'https://github.com/ArikaToshimoto/ARSt-Backend', target: '_blank' }, 'GitHub'),
        h('a', { href: '#about-section', onClick: e => { e.preventDefault(); document.getElementById('about-section')?.scrollIntoView({ behavior: 'smooth' }) } }, tr(lang, 'footer_docs'))
      )
    )
  );
}

createRoot(document.getElementById('root')).render(h(App));
</script>
</body>
</html>
